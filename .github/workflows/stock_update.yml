name: Update Thai Stock Prices

on:
  schedule:
    - cron: '10 10 * * 1-5' # รันจันทร์-ศุกร์ 17:10 น. ไทย
  workflow_dispatch: # ทำให้เรากดรันเองได้ด้วย

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock update script
        env:
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
        run: python update_stock.py
